server.port=4000
spring.application.name=jukebox-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}
spring.jpa.open-in-view=false
app.client-origin=${APP_CLIENT_ORIGIN:http://127.0.0.1:3000,http://localhost:3000}
app.google-client-id=${GOOGLE_CLIENT_ID:}
app.jwt-secret=${APP_JWT_SECRET:jukebox-dev-secret-change-this-before-production-123456}
app.jwt-ttl-seconds=${APP_JWT_TTL_SECONDS:86400}
app.admin-secret=${APP_ADMIN_SECRET:jukebox-admin-dev}
app.sms-provider=${APP_SMS_PROVIDER:mock}
app.default-country-code=${APP_DEFAULT_COUNTRY_CODE:+91}
app.expose-dev-otp=${APP_EXPOSE_DEV_OTP:false}
app.twilio-auth-user=${TWILIO_AUTH_USER:${TWILIO_ACCOUNT_SID:}}
app.twilio-auth-password=${TWILIO_AUTH_PASSWORD:${TWILIO_AUTH_TOKEN:}}
app.twilio-verify-service-sid=${TWILIO_VERIFY_SERVICE_SID:}
